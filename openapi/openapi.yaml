openapi: 3.1.0

info:
  title: GraphQL Schema Registry
  version: 0.1.0

servers:
  - url: http://localhost:3000

paths:
  /v1/graphs:
    get:
      operationId: listGraphs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The list of registered graphs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createGraph
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGraphRequest"
      responses:
        "201":
          description: The newly created graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/graphs/{graphSlug}:
    get:
      operationId: getGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
      responses:
        "200":
          description: The requested graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGraphRequest"
      responses:
        "200":
          description: The updated graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"

    delete:
      operationId: deleteGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
      responses:
        "204":
          description: Success
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/graphs/{graphSlug}/subgraphs:
    get:
      operationId: listSubgraphs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
      responses:
        "200":
          description: The list of subgraphs registered for the graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubgraphList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createSubgraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubgraphRequest"
      responses:
        "201":
          description: The newly created subgraph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subgraph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/graphs/{graphSlug}/subgraphs/{subgraphSlug}:
    get:
      operationId: getSubgraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
        - $ref: "#/components/parameters/SubgraphSlug"
      responses:
        "200":
          description: The requested subgraph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subgraph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateSubgraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
        - $ref: "#/components/parameters/SubgraphSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubgraphRequest"
      responses:
        "200":
          description: The updated subgraph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subgraph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"

    delete:
      operationId: deleteSubgraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GraphSlug"
        - $ref: "#/components/parameters/SubgraphSlug"
      responses:
        "204":
          description: Success
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      $ref: "./components/security-schemes/bearer-auth.yaml"
  parameters:
    GraphSlug:
      $ref: "./components/parameters/graph-slug.yaml"
    SubgraphSlug:
      $ref: "./components/parameters/subgraph-slug.yaml"
  schemas:
    Graph:
      $ref: "./components/schemas/graph.yaml"
    GraphList:
      $ref: "./components/schemas/graph-list.yaml"
    CreateGraphRequest:
      $ref: "./components/schemas/create-graph-request.yaml"
    UpdateGraphRequest:
      $ref: "./components/schemas/update-graph-request.yaml"
    Subgraph:
      $ref: "./components/schemas/subgraph.yaml"
    SubgraphList:
      $ref: "./components/schemas/subgraph-list.yaml"
    CreateSubgraphRequest:
      $ref: "./components/schemas/create-subgraph-request.yaml"
    UpdateSubgraphRequest:
      $ref: "./components/schemas/update-subgraph-request.yaml"
  responses:
    BadRequest:
      $ref: "./components/responses/bad-request.yaml"
    Unauthorized:
      $ref: "./components/responses/unauthorized.yaml"
    Forbidden:
      $ref: "./components/responses/forbidden.yaml"
    NotFound:
      $ref: "./components/responses/not-found.yaml"
    Conflict:
      $ref: "./components/responses/conflict.yaml"
    UnprocessableEntity:
      $ref: "./components/responses/unprocessable-entity.yaml"
