type: object
additionalProperties: false
required:
  - id
  - graphId
  - slug
  - currentRevision
  - routingUrl
  - createdAt
  - updatedAt
properties:
  id:
    type: string
  graphId:
    type: string
  slug:
    type: string
    minLength: 1
  currentRevision:
    type: string
    pattern: "^[1-9][0-9]*$"
  routingUrl:
    type: string
    format: uri
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
