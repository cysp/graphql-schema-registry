type: object
additionalProperties: false
required:
  - id
  - slug
  - currentRevision
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
  slug:
    type: string
    minLength: 1
  currentRevision:
    type: string
    pattern: "^[1-9][0-9]*$"
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
