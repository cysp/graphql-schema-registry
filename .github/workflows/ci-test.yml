name: test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test

      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-test-neon:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.NEON_PROJECT_ID != '' }}

    env:
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      NEON_PARENT_BRANCH: ${{ vars.NEON_PARENT_BRANCH || 'production' }}
      NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
      NEON_ROLE_NAME: ${{ vars.NEON_ROLE_NAME || 'neondb_owner' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: neon_compute_branch_expires_at
        run: echo "expires_at=$(date -u -d '+20 minutes' +'%Y-%m-%dT%H:%M:%SZ')" >>"${GITHUB_OUTPUT}"

      - id: neon_create_branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_BRANCH_NAME: github-actions-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          NEON_EXPIRES_AT: ${{ steps.neon_compute_branch_expires_at.outputs.expires_at }}
        run: node .github/scripts/create-neon-branch.mjs

      - uses: ./.github/actions/pgschema-apply
        env:
          PGHOST: ${{ steps.neon_create_branch.outputs.db_host }}
          PGPORT: "5432"
          PGDATABASE: ${{ env.NEON_DATABASE_NAME }}
          PGUSER: ${{ env.NEON_ROLE_NAME }}
          PGPASSWORD: ${{ steps.neon_create_branch.outputs.password }}
        with:
          pgschema-package-version: 51e4d7085fe6a324c6f6a88ad153f6821f197940
          pgschema-package: github.com/pgplex/pgschema
          file: db/neon.sql

      - shell: bash
        run: pnpm run test -- "src/**/*.integration.test.ts"
        env:
          INTEGRATION_TEST_DATABASE_URL: ${{ steps.neon_create_branch.outputs.db_url }}

      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration-neon

      - if: ${{ always() && steps.neon_create_branch.outputs.branch_id != '' }}
        uses: neondatabase/delete-branch-action@ed7d9bfda9b787d3269d18596eea76633ec34fe2 # v3.2.0
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ steps.neon_create_branch.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
